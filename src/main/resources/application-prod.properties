# 本番環境用設定

# DB設定（本番では必ず環境変数で指定する）
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.encoding=utf-8
spring.datasource.hikari.maximum-pool-size=5

spring.servlet.multipart.max-file-size=5MB


# SQL初期化（本番では実行しない）
spring.sql.init.mode=always
# SQL初期化（本番では実行しない）
#spring.sql.init.mode=never

# Cookie設定（HTTPS前提）
server.servlet.session.cookie.secure=true

# エラーハンドリング設定
spring.web.error.whitelabel.enabled=false
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false

# Remember-Meキー（本番では必ず環境変数で指定する）
security.remember-me.key=${SECURITY_REMEMBER_ME_KEY:?Environment variable SECURITY_REMEMBER_ME_KEY is required}
security.remember-me.use-secure-cookie=true
security.remember-me.token-validity-seconds=86400
security.remember-me.parameter=remember-me

# セッション設定（本番環境では1セッションのみ）
security.session.maximum-sessions=1
server.servlet.session.timeout=30m

# HSTS設定（本番環境では1年間）
security.hsts.max-age-seconds=31536000

# ログレベル
logging.level.org.springframework.web=INFO
logging.level.com.inventory.inventory_management=INFO
